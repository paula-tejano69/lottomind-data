name: Update Lottery Results

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test network access
        run: |
          echo "=== Testing key URLs ==="
          curl -s -o /dev/null -w "NY PB CSV: %{http_code}\n" "https://data.ny.gov/api/views/d6yy-54nr/rows.csv?accessType=DOWNLOAD"
          curl -s -o /dev/null -w "NY MM CSV: %{http_code}\n" "https://data.ny.gov/api/views/5xaw-6ayf/rows.csv?accessType=DOWNLOAD"
          curl -s -o /dev/null -w "NY T5 CSV: %{http_code}\n" "https://data.ny.gov/api/views/dg63-4siq/rows.csv?accessType=DOWNLOAD"
          curl -s -o /dev/null -w "TX MM CSV: %{http_code}\n" "https://www.texaslottery.com/export/sites/lottery/Games/Mega_Millions/Winning_Numbers/megamillions.csv"
          curl -s -o /dev/null -w "LottoAmerica: %{http_code}\n" "https://www.lottoamerica.com/numbers/lotto-america"
          curl -s -o /dev/null -w "NY MFL CSV: %{http_code}\n" "https://data.ny.gov/api/views/a4w9-a3tp/rows.csv?accessType=DOWNLOAD"
          echo "=== First 3 lines of NY MM CSV ==="
          curl -s "https://data.ny.gov/api/views/5xaw-6ayf/rows.csv?accessType=DOWNLOAD" | head -3
          echo "=== First 3 lines of TX MM CSV ==="
          curl -s "https://www.texaslottery.com/export/sites/lottery/Games/Mega_Millions/Winning_Numbers/megamillions.csv" | head -3
          echo "=== First 3 lines of NY Take5 CSV ==="
          curl -s "https://data.ny.gov/api/views/dg63-4siq/rows.csv?accessType=DOWNLOAD" | head -3

      - name: Fetch latest lottery results
        run: python fetch_results.py

      - name: Commit and push results.json
        run: |
          git config user.name  "LottoMind Bot"
          git config user.email "bot@lottomind.com"
          git add results.json
          git diff --staged --quiet || git commit -m "Update results $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
