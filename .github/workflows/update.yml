name: Update Lottery Results

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Save HTML pages for debugging
        run: |
          curl -s -A "Mozilla/5.0" "https://www.lottoamerica.com/archive/2026" > debug_lottoamerica.html
          curl -s -A "Mozilla/5.0" "https://www.nhlottery.com/Games/Megabucks-Doubler" > debug_megabucks.html
          curl -s -A "Mozilla/5.0" "https://www.nhlottery.com/Games/Gimme-5" > debug_gimme5.html
          curl -s -A "Mozilla/5.0" "https://www.powerball.com/previous-results?gc=2by2" > debug_2by2.html
          echo "Files saved:"
          wc -l debug_*.html

      - name: Fetch latest lottery results
        run: python fetch_results.py 2>&1

      - name: Commit and push all files
        run: |
          git config user.name  "LottoMind Bot"
          git config user.email "bot@lottomind.com"
          git add results.json debug_*.html
          git diff --staged --quiet || git commit -m "Update results + debug HTML $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
